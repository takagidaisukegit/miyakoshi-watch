name: miyakoshi-watch

on:
  schedule:
    - cron: "2 23 * * *"  #  8:02 JST
    - cron: "2 0 * * *"   #  9:02 JST
    - cron: "2 1 * * *"   # 10:02 JST
    - cron: "2 2 * * *"   # 11:02 JST
    - cron: "2 3 * * *"   # 12:02 JST
    - cron: "2 4 * * *"   # 13:02 JST
    - cron: "2 5 * * *"   # 14:02 JST
    - cron: "2 6 * * *"   # 15:02 JST
    - cron: "32 6 * * *"  # 15:32 JST
    - cron: "2 7 * * *"   # 16:02 JST
    - cron: "2 8 * * *"   # 17:02 JST
    - cron: "2 10 * * *"  # 19:02 JST
    - cron: "2 14 * * *"  # 23:02 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python src/main.py
